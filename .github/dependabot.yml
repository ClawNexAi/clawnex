# Dependabot — automated dependency updates.
#
# Two ecosystems for ClawNex: npm (the dashboard + LiteLLM Python deps live
# in their own pinned requirements.txt that we hand-curate per the
# LiteLLM-1.83.0 supply-chain incident — pip is intentionally NOT auto-
# updated), and github-actions (workflow action versions).
#
# Schedule weekly so PRs don't pile up; group ecosystem-wide updates into
# one PR per ecosystem to keep review surface small.
version: 2

updates:
  # Dashboard JS/TS deps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    groups:
      # Group minor + patch updates so we get one PR per week instead of
      # ten. Major bumps still come as individual PRs because they usually
      # need migration work.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Security updates always get their own PR regardless of grouping.
    # Bumping the cap a bit just for security so a quiet month of releases
    # doesn't queue up under the default 5.
    ignore: []

  # GitHub Actions in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
