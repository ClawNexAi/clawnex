# CodeQL static analysis for JavaScript / TypeScript.
#
# Runs on every push to main, every PR to main, and weekly so we catch
# advisories published after the last commit lands. Surfaces results in
# the Security tab. Failures don't block merges by default — review the
# alert and fix forward, or dismiss with reason.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 06:00 UTC. Same window as Dependabot so security PRs
    # tend to bunch up on one day a week, easier to triage.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality is a superset of the default security pack;
          # adds maintainability + reliability queries. Worth it for an OSS
          # repo that wants to surface obvious smells alongside CVE-class issues.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
