# ClawNex CI — build verification on every PR and push to main
#
# Ensures the project compiles, TypeScript types check, and the
# production build succeeds. Runs on Node.js 22 (LTS).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      # Generate a CycloneDX SBOM and upload as a workflow artifact so
      # downstream tools (release scripts, security scanners, customer
      # asks) have a signed-by-CI inventory of every shipped dep without
      # rebuilding locally. The npm sbom script is defined in package.json.
      - name: Generate SBOM
        run: npm run sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

  # Docker packaging is intentionally deferred. Re-add a Docker build job only
  # when the repository ships a supported Dockerfile / compose path.
